<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Sense | Predictive Analytics Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.1/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.260.0/dist/umd/lucide.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050b08;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(16, 185, 129, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.1);
            border-radius: 24px;
        }

        .glass-panel-header {
            background: rgba(16, 185, 129, 0.05);
            border-bottom: 1px solid rgba(16, 185, 129, 0.1);
        }

        /* Circular Progress Dials */
        .circular-chart {
            display: block;
            margin: 0 auto;
            max-width: 80%;
            max-height: 250px;
        }
        .circle-bg {
            fill: none;
            stroke: rgba(16, 185, 129, 0.1);
            stroke-width: 3.8;
        }
        .circle {
            fill: none;
            stroke-width: 2.8;
            stroke-linecap: round;
            animation: progress 1s ease-out forwards;
        }
        @keyframes progress {
            0% { stroke-dasharray: 0 100; }
        }

        /* Multispectral Map Simulation */
        .multispectral-map {
            background-image: url('https://images.unsplash.com/photo-1586771107445-d3ca888129ff?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
        }
        .map-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(239,68,68,0.4) 0%, rgba(16,185,129,0.3) 50%, rgba(59,130,246,0.3) 100%);
            mix-blend-mode: overlay;
        }
        .heat-zone {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
        }

        /* Audio Waves */
        .wave {
            width: 4px;
            height: 10px;
            background: #10B981;
            margin: 0 3px;
            border-radius: 20px;
            display: inline-block;
            animation: wave 1s ease-in-out infinite;
        }
        .wave:nth-child(2) { animation-delay: 0.1s; }
        .wave:nth-child(3) { animation-delay: 0.2s; }
        .wave:nth-child(4) { animation-delay: 0.3s; }
        .wave:nth-child(5) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 40px; }
        }

        .toggle-checkbox:checked {
            right: 0;
            border-color: #10B981;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #10B981;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(16, 185, 129, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [isListening, setIsListening] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [aiResponse, setAiResponse] = useState("");
            const [precisionMode, setPrecisionMode] = useState(false);
            
            // Dials Data
            const telemetry = [
                { id: 1, label: "Soil Moisture", value: 34.7, color: "#3B82F6", unit: "%" },
                { id: 2, label: "Micro-Climate", value: 0, color: "#10B981", unit: "kPa" },
                { id: 3, label: "Vapor Pressure", value: 0.8, color: "#8B5CF6", unit: "kPa" },
                { id: 4, label: "Nitrogen Level", value: 72, color: "#F59E0B", unit: "ppm" }
            ];

            const handleMicClick = () => {
                if(isListening) return;
                setIsListening(true);
                setAiResponse("");
                setTranscript("Listening for vernacular command...");
                
                setTimeout(() => {
                    setTranscript("Should I apply fertilizer to Zone 3B today?");
                    setTimeout(() => {
                        setIsListening(false);
                        setAiResponse("Based on the multispectral scan, Zone 3B moisture is stable. However, rain is expected in 4 hours. Delay application to prevent runoff waste.");
                    }, 1500);
                }, 2000);
            };

            useEffect(() => {
                lucide.createIcons();
            }, []);

            const Dial = ({ label, value, color, unit }) => (
                <div className="flex flex-col items-center bg-black/20 p-4 rounded-2xl border border-white/5">
                    <div className="relative w-24 h-24 mb-2">
                        <svg viewBox="0 0 36 36" className="circular-chart">
                            <path className="circle-bg"
                                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path className="circle" stroke={color} strokeDasharray={`${value === 0 ? 5 : value}, 100`}
                                d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center flex-col">
                            <span className="text-xl font-black text-white">{value}</span>
                            <span className="text-[9px] text-slate-400 font-bold">{unit}</span>
                        </div>
                    </div>
                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest text-center">{label}</span>
                </div>
            );

            return (
                <div className="min-h-screen p-4 lg:p-6 flex flex-col gap-6">
                    {/* Header */}
                    <header className="flex justify-between items-center glass-panel px-8 py-4">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center border border-emerald-500/30">
                                <i data-lucide="satellite" className="text-emerald-400 w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-white tracking-wide">Predictive Analytics Dashboard</h1>
                                <p className="text-[10px] text-emerald-400 uppercase tracking-[0.3em] font-bold">Terra Sense • Node #4092</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-2">
                                <span className="relative flex h-2 w-2">
                                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                  <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                </span>
                                <span className="text-xs font-bold text-emerald-500 tracking-widest uppercase">Live Link</span>
                            </div>
                            <button className="bg-white/5 hover:bg-white/10 px-6 py-2 rounded-lg text-xs font-bold text-white border border-white/10 transition-colors">
                                <i data-lucide="download" className="w-4 h-4 inline-block mr-2"></i> Export Report
                            </button>
                        </div>
                    </header>

                    {/* Main Grid */}
                    <div className="grid lg:grid-cols-12 gap-6 flex-1">
                        
                        {/* LEFT: Ground Truth Telemetry */}
                        <div className="lg:col-span-3 glass-panel flex flex-col">
                            <div className="glass-panel-header p-5">
                                <h2 className="text-sm font-black text-white uppercase tracking-widest flex items-center gap-2">
                                    <i data-lucide="activity" className="text-emerald-400 w-4 h-4"></i> Ground Truth
                                </h2>
                            </div>
                            <div className="p-5 grid grid-cols-2 gap-4 flex-1 content-start">
                                {telemetry.map(t => <Dial key={t.id} {...t} />)}
                            </div>
                            <div className="p-5 border-t border-emerald-500/10">
                                <div className="bg-amber-500/10 border border-amber-500/20 p-4 rounded-xl">
                                    <h3 className="text-xs font-bold text-amber-400 uppercase tracking-widest mb-1"><i data-lucide="alert-triangle" className="w-3 h-3 inline-block mr-1"></i> Sensor Alert</h3>
                                    <p className="text-xs text-amber-200/70 leading-relaxed">Micro-climate pressure dropped by 0.2 kPa in last hour. Precipitation highly likely.</p>
                                </div>
                            </div>
                        </div>

                        {/* CENTER: Multispectral Map & Voice */}
                        <div className="lg:col-span-6 glass-panel flex flex-col relative overflow-hidden">
                            <div className="glass-panel-header p-5 z-10 relative bg-black/40 backdrop-blur-md">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-sm font-black text-white uppercase tracking-widest flex items-center gap-2">
                                        <i data-lucide="map" className="text-emerald-400 w-4 h-4"></i> Multispectral Health Overlay
                                    </h2>
                                    <div className="flex gap-2">
                                        <span className="px-3 py-1 rounded bg-black/50 text-[9px] uppercase font-bold text-slate-300 border border-white/10">NDVI</span>
                                        <span className="px-3 py-1 rounded bg-emerald-500/20 text-[9px] uppercase font-bold text-emerald-400 border border-emerald-500/30">Thermal</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex-1 p-5 relative min-h-[400px]">
                                <div className="multispectral-map absolute inset-4 border border-white/10">
                                    <div className="map-overlay"></div>
                                    <div className="heat-zone w-64 h-64 bg-red-500 top-10 left-10"></div>
                                    <div className="heat-zone w-40 h-40 bg-emerald-500 bottom-20 right-20"></div>
                                    <div className="heat-zone w-32 h-32 bg-yellow-500 top-1/2 left-1/3"></div>
                                    
                                    {/* Map Pins */}
                                    <div className="absolute top-1/4 left-1/4 flex flex-col items-center">
                                        <div className="w-4 h-4 bg-red-500 rounded-full border-2 border-white shadow-[0_0_15px_rgba(239,68,68,0.8)] animate-pulse"></div>
                                        <span className="bg-black/80 px-2 py-1 rounded mt-2 text-[8px] font-bold text-red-300 uppercase">Zone 3B (Stress)</span>
                                    </div>
                                    <div className="absolute bottom-1/3 right-1/4 flex flex-col items-center">
                                        <div className="w-4 h-4 bg-emerald-500 rounded-full border-2 border-white shadow-[0_0_15px_rgba(16,185,129,0.8)]"></div>
                                        <span className="bg-black/80 px-2 py-1 rounded mt-2 text-[8px] font-bold text-emerald-300 uppercase">Zone 1A (Healthy)</span>
                                    </div>
                                </div>
                            </div>

                            {/* Voice Interface Overlay */}
                            <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 w-11/12 max-w-md bg-black/80 backdrop-blur-xl border border-white/10 rounded-3xl p-5 shadow-2xl flex flex-col items-center">
                                {isListening ? (
                                    <div className="flex items-center gap-1 mb-4 h-10">
                                        <div className="wave"></div><div className="wave"></div><div className="wave"></div><div className="wave"></div><div className="wave"></div>
                                    </div>
                                ) : (
                                    <button onClick={handleMicClick} className="w-16 h-16 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.4)] hover:scale-105 transition-all mb-4 border border-emerald-400">
                                        <i data-lucide="mic" className="text-white w-6 h-6"></i>
                                    </button>
                                )}
                                
                                <p className="text-xs font-bold text-emerald-400 mb-2">{transcript || "Tap to speak vernacular command"}</p>
                                {aiResponse && (
                                    <div className="bg-white/5 border border-white/10 rounded-xl p-4 w-full text-center mt-2">
                                        <p className="text-sm font-medium text-slate-200">{aiResponse}</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* RIGHT: Prescription Logic */}
                        <div className="lg:col-span-3 glass-panel flex flex-col">
                            <div className="glass-panel-header p-5 flex justify-between items-center">
                                <h2 className="text-sm font-black text-white uppercase tracking-widest flex items-center gap-2">
                                    <i data-lucide="cpu" className="text-emerald-400 w-4 h-4"></i> Prescription
                                </h2>
                                
                                {/* Toggle Switch */}
                                <div className="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                    <input type="checkbox" name="toggle" id="toggle" className="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" checked={precisionMode} onChange={() => setPrecisionMode(!precisionMode)}/>
                                    <label htmlFor="toggle" className="toggle-label block overflow-hidden h-6 rounded-full bg-slate-700 cursor-pointer"></label>
                                </div>
                            </div>
                            
                            <div className="p-5 flex-1 overflow-y-auto">
                                <div className="mb-6">
                                    <div className="flex justify-between items-end mb-2">
                                        <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Precision Mode</h3>
                                        <span className={`text-xs font-black uppercase tracking-widest ${precisionMode ? 'text-emerald-400' : 'text-slate-500'}`}>
                                            [{precisionMode ? 'ON' : 'OFF'}]
                                        </span>
                                    </div>
                                    <p className="text-xs text-slate-500 leading-relaxed">When activated, the AI overrides standard schedules with micro-targeted resource prescriptions based on real-time multispectral mapping.</p>
                                </div>

                                {precisionMode ? (
                                    <div className="space-y-4">
                                        <div className="bg-emerald-500/10 border border-emerald-500/30 p-4 rounded-xl relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                                            <span className="text-[9px] font-bold uppercase tracking-widest text-emerald-500 mb-1 block">Action Required</span>
                                            <h4 className="text-sm font-bold text-white mb-2">Zone 3B Nutrient Deficit</h4>
                                            <p className="text-xs text-slate-400 mb-3">Nitrogen levels down 14% vs baseline. Vapor pressure indicates poor absorption.</p>
                                            <div className="bg-black/40 p-3 rounded-lg border border-white/5">
                                                <code className="text-emerald-300 text-xs font-mono">EXECUTE: Apply 5L Urea/Acre via drip</code>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-slate-800/50 border border-white/5 p-4 rounded-xl relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-slate-600"></div>
                                            <span className="text-[9px] font-bold uppercase tracking-widest text-slate-500 mb-1 block">Scheduled Check</span>
                                            <h4 className="text-sm font-bold text-slate-300 mb-2">Zone 1A Soil Integrity</h4>
                                            <p className="text-xs text-slate-500">Moisture holding at optimal 34.7%. No action required for 48 hours.</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="h-40 flex items-center justify-center border-2 border-dashed border-white/10 rounded-xl">
                                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest text-center">Toggle Precision Mode<br/>to generate AI actions</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Footer: Economic Impact Projection */}
                    <div className="glass-panel p-6 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-gold/20 rounded-xl flex items-center justify-center border border-[#D4AF37]/30">
                                <i data-lucide="trending-up" className="text-[#D4AF37] w-6 h-6"></i>
                            </div>
                            <div>
                                <h3 className="text-lg font-black text-white tracking-wide">Economic Impact Projection</h3>
                                <p className="text-[10px] text-slate-400 uppercase tracking-[0.2em] font-bold">Current Season Estimate</p>
                            </div>
                        </div>

                        <div className="flex flex-wrap gap-8">
                            <div className="text-right">
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold mb-1">Water Savings</p>
                                <p className="text-2xl font-black text-blue-400">40%</p>
                            </div>
                            <div className="w-px h-10 bg-white/10"></div>
                            <div className="text-right">
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold mb-1">Fertilizer Savings</p>
                                <p className="text-2xl font-black text-emerald-400">₹8,200</p>
                            </div>
                            <div className="w-px h-10 bg-white/10"></div>
                            <div className="text-right bg-white/5 px-6 py-2 rounded-xl border border-white/10">
                                <p className="text-[10px] text-[#D4AF37] uppercase tracking-widest font-bold mb-1">Total Savings</p>
                                <p className="text-3xl font-black text-white">+₹23,200 <span className="text-sm text-slate-500 font-medium tracking-normal">/ Season</span></p>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
